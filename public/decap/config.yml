backend:
  name: github
  repo: magicaiweb/magicai-mario-bassil
  branch: main

local_backend: true
publish_mode: editorial_workflow
media_folder: public/uploads
public_folder: /uploads

collections:
  - name: website
    label: Website Content
    files:
      - name: content
        label: Editable Content Model
        file: content/site.json
        format: json
        fields:
          - { label: Navigation, name: nav, widget: list }
          - { label: Hero, name: hero, widget: object }
          - { label: Sections, name: sections, widget: list }
          - label: Events
            name: events
            widget: list
            fields:
              - { label: Slug, name: slug, widget: string }
              - { label: Date, name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false }
              - { label: Start Time, name: startTime, widget: string }
              - { label: End Time, name: endTime, widget: string }
              - label: Event Title
                name: label
                widget: object
                fields:
                  - { label: English, name: en, widget: string }
                  - { label: Arabic, name: ar, widget: string }
              - label: City / Location
                name: city
                widget: object
                fields:
                  - { label: English, name: en, widget: string }
                  - { label: Arabic, name: ar, widget: string }
              - label: Venue
                name: venue
                widget: object
                fields:
                  - { label: English, name: en, widget: string }
                  - { label: Arabic, name: ar, widget: string }
              - label: Description
                name: description
                widget: object
                fields:
                  - { label: English, name: en, widget: text }
                  - { label: Arabic, name: ar, widget: text }
              - label: Ticket Price
                name: ticketPrice
                widget: object
                fields:
                  - { label: English, name: en, widget: string }
                  - { label: Arabic, name: ar, widget: string }
              - { label: Ticket URL, name: ticketUrl, widget: string }
              - { label: Poster Image, name: posterImage, widget: image, required: false }
              - { label: Poster Fallback Tone, name: posterTone, widget: string, required: false }
              - label: Status
                name: status
                widget: select
                options: ["on-sale", "soon", "past"]
          - { label: Media, name: media, widget: list }
          - { label: Gallery, name: gallery, widget: list }
          - { label: Press, name: press, widget: list }
          - { label: Contacts, name: contacts, widget: object }
          - { label: Custom Pages, name: pages, widget: list }
