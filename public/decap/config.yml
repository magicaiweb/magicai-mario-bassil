backend:
  name: github
  repo: magicaiweb/magicai-mario-bassil
  branch: main

local_backend: true
publish_mode: editorial_workflow
media_folder: public/uploads
public_folder: /uploads

collections:
  - name: website
    label: Website Content
    files:
      - name: content
        label: Editable Content Model
        file: content/site.json
        format: json
        fields:
          - label: Navigation
            name: nav
            widget: list
            fields:
              - label: Label
                name: label
                widget: object
                fields:
                  - { label: English, name: en, widget: string }
                  - { label: Arabic, name: ar, widget: string }
              - { label: Link, name: href, widget: string }
          - label: Hero
            name: hero
            widget: object
            fields:
              - label: Eyebrow
                name: eyebrow
                widget: object
                fields: &localized_string
                  - { label: English, name: en, widget: string }
                  - { label: Arabic, name: ar, widget: string }
              - label: Title
                name: title
                widget: object
                fields: *localized_string
              - label: Subtitle
                name: subtitle
                widget: object
                fields: &localized_text
                  - { label: English, name: en, widget: text }
                  - { label: Arabic, name: ar, widget: text }
              - { label: Hero Image URL, name: image, widget: string }
              - label: Primary CTA
                name: primaryCta
                widget: object
                fields: *localized_string
              - label: Secondary CTA
                name: secondaryCta
                widget: object
                fields: *localized_string
          - label: Sections
            name: sections
            widget: list
            fields:
              - { label: Slug / ID, name: id, widget: string }
              - label: Section type
                name: type
                widget: select
                options: ["hero", "text", "events", "media", "gallery", "press", "form"]
              - label: Title
                name: title
                widget: object
                fields: *localized_string
              - label: Body
                name: body
                widget: object
                fields: *localized_text
              - label: CTA label
                name: ctaLabel
                widget: object
                required: false
                fields: *localized_string
              - label: Cards
                name: cards
                widget: list
                required: false
                fields:
                  - label: Title
                    name: title
                    widget: object
                    fields: *localized_string
                  - label: Body
                    name: body
                    widget: object
                    fields: *localized_text
              - label: Status
                name: status
                widget: select
                options: ["published", "draft"]
          - label: Events
            name: events
            widget: list
            fields:
              - { label: Slug, name: slug, widget: string }
              - { label: Date, name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false }
              - { label: Start Time, name: startTime, widget: string }
              - { label: End Time, name: endTime, widget: string }
              - label: Event Title
                name: label
                widget: object
                fields: *localized_string
              - label: City / Location
                name: city
                widget: object
                fields: *localized_string
              - label: Venue
                name: venue
                widget: object
                fields: *localized_string
              - label: Description
                name: description
                widget: object
                fields: *localized_text
              - label: Ticket Price
                name: ticketPrice
                widget: object
                fields: *localized_string
              - { label: Ticket URL, name: ticketUrl, widget: string }
              - { label: Poster Image, name: posterImage, widget: image, required: false }
              - { label: Poster Fallback Tone, name: posterTone, widget: string, required: false }
              - label: Status
                name: status
                widget: select
                options: ["on-sale", "soon", "past"]
          - label: Videos
            name: media
            widget: list
            fields:
              - label: Title
                name: title
                widget: object
                fields: *localized_string
              - label: Source
                name: source
                widget: select
                options: ["YouTube", "Instagram", "Facebook"]
              - { label: URL, name: url, widget: string }
              - { label: Thumbnail Image URL, name: thumbnailImage, widget: string, required: false }
              - label: Category
                name: category
                widget: object
                fields: *localized_string
          - label: Gallery
            name: gallery
            widget: list
            fields:
              - label: Label
                name: label
                widget: object
                fields: *localized_string
              - { label: Image URL, name: image, widget: string }
              - { label: Fallback Gradient, name: tone, widget: string }
          - label: Press / YouTube
            name: press
            widget: list
            fields:
              - label: Title
                name: title
                widget: object
                fields: *localized_string
              - { label: Outlet, name: outlet, widget: string }
              - { label: URL, name: url, widget: string }
              - label: Type
                name: type
                widget: select
                options: ["Interview", "Article", "YouTube"]
          - label: Contacts
            name: contacts
            widget: object
            fields:
              - { label: Email, name: email, widget: string }
              - { label: Facebook, name: facebook, widget: string }
              - { label: Instagram, name: instagram, widget: string }
          - label: Custom Pages
            name: pages
            widget: list
            fields:
              - { label: Slug, name: slug, widget: string }
              - label: Title
                name: title
                widget: object
                fields: *localized_string
              - label: Summary
                name: summary
                widget: object
                fields: *localized_text
              - label: Sections
                name: sections
                widget: list
                fields:
                  - label: Heading
                    name: heading
                    widget: object
                    fields: *localized_string
                  - label: Body
                    name: body
                    widget: object
                    fields: *localized_text
